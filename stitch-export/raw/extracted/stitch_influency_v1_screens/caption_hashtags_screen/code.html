<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#660ce4",
                        "background-light": "#f5f5f5",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="flex flex-col min-h-screen max-w-[390px] mx-auto bg-background-light dark:bg-background-dark shadow-2xl relative overflow-hidden">
<!-- TopAppBar -->
<header class="bg-primary pt-12 pb-6 px-4 rounded-b-xl shadow-lg">
<div class="flex items-center justify-between">
<button class="text-white hover:bg-white/10 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Legenda e Hashtags</h1>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-6">
<!-- Caption Section -->
<section class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<h2 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider">Legenda</h2>
</div>
<div class="relative">
<textarea class="w-full h-48 p-4 rounded-xl border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent resize-none placeholder:text-slate-400 text-base leading-relaxed" placeholder="Escreva sua legenda..."></textarea>
<div class="absolute bottom-3 right-4">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400 bg-background-light/80 dark:bg-background-dark/80 px-2 py-1 rounded-full">0/2200</span>
</div>
</div>
</section>
<!-- AI Button Section -->
<section>
<button class="w-full flex items-center justify-center gap-2 py-3 px-4 border-2 border-primary text-primary font-bold rounded-xl hover:bg-primary/5 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">auto_awesome</span>
<span>Gerar legenda com IA</span>
</button>
</section>
<!-- Hashtags Section -->
<section class="flex flex-col gap-3">
<h2 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider">Hashtags</h2>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">tag</span>
<input class="w-full pl-10 pr-4 py-3 rounded-xl border border-primary/20 bg-white dark:bg-background-dark/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none" placeholder="Adicionar hashtags..." type="text"/>
</div>
<!-- Suggestions Chips -->
<div class="flex flex-wrap gap-2 mt-1">
<div class="flex items-center gap-1 bg-primary/10 text-primary px-3 py-1.5 rounded-full text-sm font-semibold border border-primary/10 cursor-pointer hover:bg-primary/20">
<span>#marketing</span>
<span class="material-symbols-outlined text-sm">add</span>
</div>
<div class="flex items-center gap-1 bg-primary/10 text-primary px-3 py-1.5 rounded-full text-sm font-semibold border border-primary/10 cursor-pointer hover:bg-primary/20">
<span>#viral</span>
<span class="material-symbols-outlined text-sm">add</span>
</div>
<div class="flex items-center gap-1 bg-primary/10 text-primary px-3 py-1.5 rounded-full text-sm font-semibold border border-primary/10 cursor-pointer hover:bg-primary/20">
<span>#influencer</span>
<span class="material-symbols-outlined text-sm">add</span>
</div>
<div class="flex items-center gap-1 bg-primary/10 text-primary px-3 py-1.5 rounded-full text-sm font-semibold border border-primary/10 cursor-pointer hover:bg-primary/20">
<span>#brasil</span>
<span class="material-symbols-outlined text-sm">add</span>
</div>
</div>
</section>
<!-- Preview/Visual Hint (Optional UI Polish) -->
<section class="mt-4 p-4 rounded-xl bg-primary/5 border border-dashed border-primary/30">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-primary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary">image</span>
</div>
<div>
<p class="text-sm font-bold text-slate-900 dark:text-slate-100">Visualizar postagem</p>
<p class="text-xs text-slate-500">Confira como ficará no feed</p>
</div>
<span class="material-symbols-outlined ml-auto text-slate-400">chevron_right</span>
</div>
</section>
</main>
<!-- Fixed Bottom Action Bar -->
<footer class="p-6 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-primary/10">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Próximo</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- iOS Home Indicator Spacing -->
<div class="h-4"></div>
</footer>
</div>
</body></html>
