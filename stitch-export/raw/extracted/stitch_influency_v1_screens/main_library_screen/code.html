<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#660ce4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .ios-status-bar {
            height: 47px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 flex justify-center items-center min-h-screen">
<!-- Mobile Container (iPhone 14 Pro size approx 393x852) -->
<div class="relative w-[390px] h-[844px] bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-800 rounded-[3rem]">
<!-- iOS Status Bar -->
<div class="ios-status-bar flex justify-between items-center px-8 w-full shrink-0">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-base">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-base">wifi</span>
<span class="material-symbols-outlined text-base">battery_full</span>
</div>
</div>
<!-- Header -->
<header class="px-6 pt-2 pb-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">menu</span>
</button>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Biblioteca</h1>
</div>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">search</span>
</button>
</header>
<!-- Tabs -->
<nav class="flex border-b border-primary/10 px-4">
<a class="flex-1 py-3 text-center relative" href="#">
<span class="text-sm font-bold text-primary">Roteiros</span>
<div class="absolute bottom-0 left-0 w-full h-[3px] bg-primary rounded-t-full"></div>
</a>
<a class="flex-1 py-3 text-center" href="#">
<span class="text-sm font-bold text-slate-500 dark:text-slate-400">Vídeos</span>
</a>
<a class="flex-1 py-3 text-center" href="#">
<span class="text-sm font-bold text-slate-500 dark:text-slate-400">Carrosséis</span>
</a>
</nav>
<!-- Main Content (Empty State) -->
<main class="flex-1 flex flex-col items-center justify-center px-8 pb-20">
<div class="w-full max-w-[280px] aspect-square mb-8 relative">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<div class="relative flex flex-col items-center justify-center h-full">
<!-- Custom Empty Illustration Shape -->
<div class="w-32 h-32 bg-primary/10 rounded-2xl rotate-12 flex items-center justify-center">
<div class="w-32 h-32 bg-primary/20 rounded-2xl -rotate-12 flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-primary/60">folder_open</span>
</div>
</div>
</div>
</div>
<div class="text-center space-y-3">
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Nenhum item ainda</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed max-w-[240px] mx-auto">
                    Comece a criar seus roteiros, vídeos ou carrosséis para visualizá-los aqui.
                </p>
</div>
<button class="mt-8 flex items-center justify-center gap-2 bg-primary text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-primary/20 hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-lg">add</span>
<span>Criar novo</span>
</button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-white/80 dark:bg-background-dark/80 backdrop-blur-lg border-t border-primary/10 pb-8 pt-2">
<div class="flex justify-around items-end">
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">home</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary">Início</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-primary fill-[1]">auto_stories</span>
<span class="text-[10px] font-bold text-primary">Biblioteca</span>
</a>
<a class="flex flex-col items-center justify-center -mt-6" href="#">
<div class="bg-primary p-3 rounded-2xl shadow-lg shadow-primary/30 text-white">
<span class="material-symbols-outlined text-2xl">add</span>
</div>
<span class="text-[10px] font-medium text-slate-400 mt-1">Criar</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">trending_up</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary">Trends</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">person</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary">Perfil</span>
</a>
</div>
</nav>
<!-- iOS Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
