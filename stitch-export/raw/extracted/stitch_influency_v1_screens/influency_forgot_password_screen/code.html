<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6400f0",
                        "background-light": "#f7f5f8",
                        "background-dark": "#170f23",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Influency - Recuperar Senha</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- Main Container (Mobile Viewport Emulation) -->
<div class="relative mx-auto min-h-screen w-full max-w-[390px] bg-white dark:bg-slate-950 flex flex-col shadow-2xl overflow-hidden">
<!-- Header -->
<header class="flex items-center px-4 py-5 bg-white dark:bg-slate-950">
<button aria-label="Voltar" class="text-slate-900 dark:text-slate-100 p-1 -ml-1 flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="flex-1 text-center mr-6 text-slate-900 dark:text-slate-100 text-[20px] font-bold tracking-tight">
                Recuperar Senha
            </h1>
</header>
<!-- Content Section -->
<main class="flex-1 px-6 flex flex-col items-center">
<!-- Icon Section -->
<div class="mt-12 mb-6 flex items-center justify-center">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[48px]">mail</span>
</div>
</div>
<!-- Title & Description -->
<div class="text-center space-y-3">
<h2 class="text-slate-900 dark:text-slate-100 text-[24px] font-bold leading-tight">
                    Esqueceu sua senha?
                </h2>
<p class="text-slate-500 dark:text-slate-400 text-[14px] leading-relaxed max-w-[280px] mx-auto">
                    Digite seu email e enviaremos um link para redefinir sua senha
                </p>
</div>
<!-- Form -->
<form class="w-full mt-10 space-y-6">
<div class="space-y-2">
<label class="block text-[14px] font-medium text-slate-500 dark:text-slate-400 ml-1" for="email">
                        Email
                    </label>
<input class="w-full h-[44px] px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="email" name="email" placeholder="seu@email.com" type="email"/>
</div>
<!-- Primary Action -->
<button class="w-full h-[44px] bg-primary hover:bg-primary/90 text-white font-bold text-[14px] rounded-lg transition-colors shadow-sm" type="submit">
                    Enviar link de recuperação
                </button>
</form>
</main>
<!-- Footer -->
<footer class="mt-auto pb-10 flex justify-center">
<a class="text-primary font-semibold text-[14px] hover:underline underline-offset-4" href="#">
                Voltar para login
            </a>
</footer>
<!-- iOS Indicator (Optional decoration for mobile feel) -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
</div>
</body></html>
