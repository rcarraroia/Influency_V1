<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6400f0",
                        "background-light": "#f7f5f8",
                        "background-dark": "#170f23",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark flex justify-center items-center min-h-screen">
<div class="relative flex flex-col w-[390px] h-[844px] bg-white dark:bg-slate-900 overflow-hidden shadow-2xl rounded-[3rem] border-[8px] border-slate-800">
<!-- Status Bar Mockup (iOS style) -->
<div class="flex justify-between items-center px-8 pt-4 pb-2 w-full">
<span class="text-sm font-bold dark:text-white">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-sm dark:text-white">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm dark:text-white">wifi</span>
<span class="material-symbols-outlined text-sm dark:text-white rotate-90">battery_full</span>
</div>
</div>
<!-- Header & Progress Bar -->
<div class="px-6 pt-4 pb-2">
<div class="flex items-center justify-between mb-6">
<span class="material-symbols-outlined text-slate-800 dark:text-slate-100 cursor-pointer">close</span>
<h1 class="text-xl font-bold text-slate-900 dark:text-white font-display">Influency</h1>
<div class="w-6"></div> <!-- Spacer for centering title -->
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Pergunta 1 de 5</p>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/5"></div>
</div>
</div>
</div>
<!-- Content Area -->
<div class="flex-1 px-6 py-8 flex flex-col items-center">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white leading-tight mb-10 w-full">
                Qual é o seu nicho ou negócio?
            </h2>
<!-- Voice Input Section -->
<div class="flex flex-col items-center gap-4 mb-8">
<button class="w-[72px] h-[72px] rounded-full bg-primary flex items-center justify-center text-white shadow-lg hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl">mic</span>
</button>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Toque para falar</p>
</div>
<!-- Divider -->
<div class="flex items-center w-full gap-4 mb-8">
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
<span class="text-xs font-bold text-slate-400 uppercase tracking-widest">ou</span>
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
</div>
<!-- Text Input Area -->
<div class="w-full">
<textarea class="w-full h-[120px] p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all resize-none font-display text-base" placeholder="Digite sua resposta aqui..."></textarea>
</div>
</div>
<!-- Navigation Buttons -->
<div class="px-6 pb-10 pt-4 bg-white dark:bg-slate-900 flex gap-3">
<button class="flex-1 h-12 rounded-xl border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-bold text-base hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                Voltar
            </button>
<button class="flex-[1.5] h-12 rounded-xl bg-primary text-white font-bold text-base hover:bg-primary/90 transition-colors shadow-md">
                Próxima
            </button>
</div>
<!-- iOS Home Indicator -->
<div class="w-full flex justify-center pb-2">
<div class="w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</body></html>
