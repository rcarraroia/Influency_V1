<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6400f0",
                        "background-light": "#f7f5f8",
                        "background-dark": "#170f23",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark flex items-center justify-center min-h-screen">
<!-- Mobile Container (390x844px) -->
<div class="relative w-[390px] h-[844px] bg-white dark:bg-[#1c1429] overflow-hidden flex flex-col items-center shadow-2xl rounded-[3rem] border-[8px] border-slate-900 dark:border-slate-800">
<!-- Status Bar Placeholder -->
<div class="w-full h-11 flex justify-between items-center px-8 pt-2">
<span class="text-sm font-semibold text-slate-900 dark:text-slate-100">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-sm text-slate-900 dark:text-slate-100">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm text-slate-900 dark:text-slate-100">wifi</span>
<span class="material-symbols-outlined text-sm text-slate-900 dark:text-slate-100">battery_full</span>
</div>
</div>
<!-- Main Content (Centered Vertically) -->
<div class="flex-1 flex flex-col items-center justify-center px-6 text-center">
<!-- Illustration Area -->
<div class="w-[200px] h-[200px] mb-12 relative">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl"></div>
<div class="relative w-full h-full bg-gradient-to-tr from-primary to-purple-400 rounded-3xl overflow-hidden shadow-lg flex items-center justify-center" data-alt="Abstract colorful illustration representing creative content production">
<span class="material-symbols-outlined text-white text-7xl">auto_awesome</span>
<!-- Decorative floating elements -->
<div class="absolute top-4 right-4 bg-white/20 backdrop-blur-sm p-2 rounded-lg">
<span class="material-symbols-outlined text-white text-xl">videocam</span>
</div>
<div class="absolute bottom-4 left-4 bg-white/20 backdrop-blur-sm p-2 rounded-lg">
<span class="material-symbols-outlined text-white text-xl">favorite</span>
</div>
</div>
</div>
<!-- Title -->
<h1 class="text-[#130c1d] dark:text-slate-50 text-[28px] font-bold leading-tight mb-4 px-4">
                Bem-vinda ao Influency!
            </h1>
<!-- Subtitle -->
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed max-w-[300px] mx-auto">
                Vou te ajudar a criar conteúdo viral para suas redes sociais
            </p>
</div>
<!-- Primary Action Area -->
<div class="w-full px-6 mb-[100px]">
<button class="w-full h-[44px] bg-primary hover:bg-primary/90 text-white font-bold text-base rounded-lg transition-colors shadow-md shadow-primary/20 flex items-center justify-center">
<span>Começar</span>
</button>
</div>
<!-- iOS Home Indicator -->
<div class="absolute bottom-2 w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
