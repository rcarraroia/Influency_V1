<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6400f0",
                        "background-light": "#f5f5f5",
                        "background-dark": "#170f23",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .chat-container {
            height: calc(844px - 56px - 88px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark flex justify-center items-center min-h-screen">
<!-- Mobile Frame (390x844px) -->
<div class="relative w-[390px] h-[844px] bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden flex flex-col">
<!-- Header (Fixed 56px) -->
<header class="h-[56px] w-full bg-primary flex items-center justify-between px-4 shrink-0 z-20">
<button class="text-white p-2">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="text-white text-[20px] font-semibold flex-1 text-center">Assistente IA</h1>
<button class="text-white p-2">
<span class="material-symbols-outlined">history</span>
</button>
</header>
<!-- Chat Area (Scrollable) -->
<main class="flex-1 overflow-y-auto p-4 space-y-4 chat-container">
<!-- Assistant Message 1 -->
<div class="flex items-end gap-2 max-w-[85%]">
<div class="size-8 rounded-full bg-primary flex items-center justify-center shrink-0 mb-1">
<span class="text-[10px] font-bold text-white">IA</span>
</div>
<div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-4 rounded-2xl rounded-bl-none shadow-sm">
<p class="text-[15px] leading-relaxed">Olá! Sou seu assistente de criação de conteúdo. Como posso ajudar você hoje?</p>
</div>
</div>
<!-- User Message 1 -->
<div class="flex items-end justify-end gap-2 w-full">
<div class="bg-primary text-white p-4 rounded-2xl rounded-br-none max-w-[85%] shadow-md">
<p class="text-[15px] leading-relaxed">Preciso de ideias para um vídeo sobre marketing digital</p>
</div>
</div>
<!-- Assistant Message 2 -->
<div class="flex items-end gap-2 max-w-[85%]">
<div class="size-8 rounded-full bg-primary flex items-center justify-center shrink-0 mb-1">
<span class="text-[10px] font-bold text-white">IA</span>
</div>
<div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 p-4 rounded-2xl rounded-bl-none shadow-sm">
<p class="text-[15px] leading-relaxed">Ótimo! Vou sugerir 3 ideias de vídeos virais sobre marketing digital...</p>
</div>
</div>
<!-- Assistant Thinking State (Optional Polish) -->
<div class="flex items-end gap-2 max-w-[85%]">
<div class="size-8 rounded-full bg-primary flex items-center justify-center shrink-0 mb-1">
<span class="text-[10px] font-bold text-white">IA</span>
</div>
<div class="bg-white/50 dark:bg-slate-800/50 p-3 rounded-2xl rounded-bl-none">
<div class="flex gap-1">
<div class="size-1.5 bg-primary/40 rounded-full"></div>
<div class="size-1.5 bg-primary/40 rounded-full"></div>
<div class="size-1.5 bg-primary/40 rounded-full"></div>
</div>
</div>
</div>
</main>
<!-- Footer (Fixed) -->
<footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-4 pb-8 z-20">
<div class="flex items-center gap-3">
<!-- Voice Button -->
<button class="size-12 rounded-full bg-primary flex items-center justify-center text-white shrink-0 shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined">mic</span>
</button>
<!-- Input Field -->
<div class="flex-1 bg-slate-100 dark:bg-slate-800 rounded-full px-4 py-3 flex items-center border border-transparent focus-within:border-primary/30 transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 text-[15px] text-slate-900 dark:text-slate-100 placeholder-slate-500" placeholder="Digite sua mensagem..." type="text"/>
</div>
<!-- Send Button -->
<button class="size-12 rounded-full bg-primary flex items-center justify-center text-white shrink-0 shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_upward</span>
</button>
</div>
</footer>
<!-- iOS Bottom Indicator (Optional for authenticity) -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
