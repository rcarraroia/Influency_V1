<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#660ce4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .ios-status-bar {
            height: 44px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex justify-center">
<!-- Mobile Container (390x844px approximation) -->
<div class="w-full max-w-[390px] min-h-screen bg-background-light dark:bg-background-dark shadow-2xl relative flex flex-col overflow-hidden">
<!-- Header -->
<header class="bg-primary pt-12 pb-6 px-4 rounded-b-xl">
<div class="flex items-center justify-between text-white">
<button class="flex items-center justify-center p-2 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Vídeo Pronto</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto p-4 space-y-6">
<!-- Video Player Preview -->
<div class="relative w-full aspect-[9/16] max-h-[400px] bg-slate-900 rounded-xl overflow-hidden shadow-lg group">
<div class="absolute inset-0 flex items-center justify-center bg-cover bg-center" data-alt="Influencer recording a video in a studio" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDFcoYL1UAD5eg-hLA1b08IaCUlnTdAb5rrB67sJ8ZMBC2eyni5S9rPWGRCqfyhV0sG-lSnpY15Pgk5mKY4i1sru_nBFIjKlhR_FYPAYxFhB5AzFHeMHg6EKYnLQiuqZBFUouqfhLROM2N-lY_sLEbYWj3lX6fSxQDJ5rPO3LYL9-vMiYDOh-BAGamCWsBDAdLO6GlTavSJsQACtYgFVteaPWkTpQ357IQ_sYjnZOOU61TCsNotsbsc_HYVRc4uTg8LK44l4_0vvPez')">
<div class="absolute inset-0 bg-black/20"></div>
</div>
<!-- Play Button Overlay -->
<button class="relative z-10 flex items-center justify-center size-16 rounded-full bg-white/20 backdrop-blur-md border border-white/30 text-white hover:scale-105 transition-transform">
<span class="material-symbols-outlined !text-4xl fill-1">play_arrow</span>
</button>
<!-- Video Progress Bar -->
<div class="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/60 to-transparent">
<div class="flex items-center gap-3 mb-1">
<div class="h-1 flex-1 bg-white/30 rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary rounded-full"></div>
</div>
</div>
<div class="flex justify-between text-[10px] text-white font-medium">
<span>0:30</span>
<span>1:30</span>
</div>
</div>
</div>
<!-- Before/After Toggle Card -->
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/10 shadow-sm flex items-center justify-between">
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 font-bold text-base">Ver antes/depois</span>
<span class="text-slate-500 dark:text-slate-400 text-sm">Compare a versão original</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Video Metrics Card -->
<section class="space-y-3">
<h3 class="text-slate-900 dark:text-slate-100 font-bold text-lg px-1">Métricas do Vídeo</h3>
<div class="bg-white dark:bg-slate-800/50 rounded-xl border border-primary/5 shadow-sm divide-y divide-slate-100 dark:divide-slate-700">
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">schedule</span>
<span class="text-slate-600 dark:text-slate-300 text-sm font-medium">Duração</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold text-sm">1:30</span>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">closed_caption</span>
<span class="text-slate-600 dark:text-slate-300 text-sm font-medium">Legendas</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold text-sm">Ativadas</span>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">music_note</span>
<span class="text-slate-600 dark:text-slate-300 text-sm font-medium">Música</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold text-sm">Ativada</span>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">content_cut</span>
<span class="text-slate-600 dark:text-slate-300 text-sm font-medium">Cortes</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-bold text-sm">3 aplicados</span>
</div>
</div>
</section>
</main>
<!-- Fixed Footer Actions -->
<footer class="p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 space-y-3">
<button class="w-full py-4 px-6 rounded-xl border-2 border-primary text-primary font-bold text-base hover:bg-primary/5 transition-colors">
                Editar Novamente
            </button>
<button class="w-full py-4 px-6 rounded-xl bg-primary text-white font-bold text-base shadow-lg shadow-primary/30 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
<span>Publicar</span>
<span class="material-symbols-outlined text-xl">rocket_launch</span>
</button>
<!-- iOS Home Indicator Spacer -->
<div class="h-6 w-32 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mt-2 opacity-30"></div>
</footer>
</div>
</body></html>
