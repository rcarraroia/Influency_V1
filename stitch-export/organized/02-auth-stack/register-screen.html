<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Influency Registration Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6200EE",
                        "background-light": "#f7f5f8",
                        "background-dark": "#170f23",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"],
                        "sans": ["Roboto", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Roboto', sans-serif;
        }
        .ios-screen {
            width: 390px;
            height: 844px;
            max-width: 100%;
            margin: 0 auto;
            position: relative;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .ios-screen::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-200 flex items-center justify-center min-h-screen">
<div class="ios-screen bg-background-light dark:bg-background-dark shadow-2xl flex flex-col">
<!-- Top App Bar / Header -->
<div class="pt-12 pb-6 px-6 flex flex-col items-center">
<div class="w-[60px] h-[60px] rounded-xl bg-primary flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl">rocket_launch</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold font-display">Criar Conta</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Comece a criar conteúdo viral hoje</p>
</div>
<!-- Form Section -->
<div class="flex-1 px-6 pb-8 overflow-y-auto">
<form class="space-y-4">
<!-- Full Name -->
<div>
<label class="block text-slate-500 dark:text-slate-400 text-[14px] font-medium mb-1">Nome completo</label>
<div class="relative">
<input class="w-full h-[44px] px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="Seu nome" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-green-500 text-[20px]">check_circle</span>
</div>
</div>
<!-- Email -->
<div>
<label class="block text-slate-500 dark:text-slate-400 text-[14px] font-medium mb-1">Email</label>
<div class="relative">
<input class="w-full h-[44px] px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="seu@email.com" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-green-500 text-[20px]">check_circle</span>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-slate-500 dark:text-slate-400 text-[14px] font-medium mb-1">Senha</label>
<div class="relative">
<input class="w-full h-[44px] px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]" type="button">visibility</button>
</div>
<p class="text-slate-400 dark:text-slate-500 text-[12px] mt-1.5 ml-1">Mínimo 8 caracteres</p>
</div>
<!-- Confirm Password -->
<div>
<label class="block text-slate-500 dark:text-slate-400 text-[14px] font-medium mb-1">Confirmar senha</label>
<div class="relative">
<input class="w-full h-[44px] px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]" type="button">visibility</button>
</div>
</div>
<!-- Spacer -->
<div class="pt-2"></div>
<!-- Primary Action -->
<button class="w-full h-[44px] bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/30 transition-all active:scale-[0.98]" type="submit">
                    Criar Conta
                </button>
<!-- Footer -->
<div class="pt-6 text-center">
<p class="text-slate-500 dark:text-slate-400 text-[14px]">
                        Já tem conta? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Fazer login</a>
</p>
</div>
</form>
</div>
<!-- Social Register Alternative (Optional but adds to modern UI) -->
<div class="px-6 pb-12">
<div class="flex items-center gap-4 mb-6">
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
<span class="text-slate-400 text-xs">Ou registre-se com</span>
<div class="h-px bg-slate-200 dark:bg-slate-700 flex-1"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-[44px] border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img class="w-5 h-5" data-alt="Google logo icon small" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJjpF2tdvXCbI1Q8iuNWhFDN6BUjJf_wywPdLx7G4f_d5TWXTtInlzMpIMLScscOAYKzYJi9cqxoa8LBy9eAkFswpDXI0D-4OzEfvzgHDyLWyYLS64ubSv8PzkNi2933o3RZjlKOEEaBc6Pth3N13U7_9dxeWxynMK60yHyJON2VTbB41zWSmgO9CpsSrGGapX9I0jwXqXpBNZKAweGKrKPt2h8QwAaAgRPc0t9nmIoKLZ96CXxd9myOqcTpnvhSmQmHnQlmQfml4G"/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-[44px] border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img class="w-5 h-5" data-alt="Apple logo icon small" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXZe35q8UfFFbx4pRSYtO21qm-8VIzZKySdZK-dDXJdeWfzONUxhtgFBUef5tBViVA7cwcnq8ht62_MRL_3mb-Ak265NwNcNW0CmIaW9GR4TPCAFIHlfHmvrYaBbnQvoMNLbWnEnWcmnHfFHJmeSbib2_bYXn6z6XZWCahnVh3XXKYZsuexljCVV9IBKxqMDTxGhI8cTflzJgnbOmU31v0pPbqLwRQ-B_G3bgQRZO7RFmS6je4U6W9jHqAf2PTO2h-NbTf3huZ1syd"/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Apple</span>
</button>
</div>
</div>
<!-- Navigation Indicator (iOS Home Bar) -->
<div class="h-1.5 w-32 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-2"></div>
</div>
</body></html>
