<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#660ce4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .ios-status-bar {
            height: 44px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-display">
<!-- Main Container (Phone Mockup Size 390x844px centered for preview) -->
<div class="relative mx-auto w-[390px] h-[844px] bg-background-light dark:bg-background-dark overflow-hidden flex flex-col shadow-2xl border border-slate-200 dark:border-slate-800">
<!-- Header -->
<header class="bg-background-light dark:bg-background-dark pt-12 pb-4 px-4">
<div class="flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios</span>
</button>
<h1 class="text-lg font-bold text-slate-900 dark:text-slate-100">Redes Sociais</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content -->
<main class="flex-1 px-4 overflow-y-auto">
<div class="mt-4 space-y-4">
<!-- Instagram Card -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined text-2xl">photo_camera</span>
</div>
<div class="flex flex-col">
<p class="text-base font-semibold text-slate-900 dark:text-slate-100">Instagram</p>
<p class="text-sm text-slate-500 dark:text-slate-400">@usuario</p>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-medium text-emerald-600 dark:text-emerald-400">Conectado</span>
<div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
</div>
</div>
<!-- TikTok Card -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined text-2xl">music_note</span>
</div>
<div class="flex flex-col">
<p class="text-base font-semibold text-slate-900 dark:text-slate-100">TikTok</p>
<p class="text-sm text-slate-500 dark:text-slate-400">@usuario</p>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-medium text-emerald-600 dark:text-emerald-400">Conectado</span>
<div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
</div>
</div>
</div>
</main>
<!-- Floating Action Button -->
<div class="absolute bottom-24 right-6">
<button class="flex items-center gap-3 bg-primary text-white px-6 py-4 rounded-full shadow-lg hover:brightness-110 active:scale-95 transition-all">
<span class="material-symbols-outlined font-bold">add</span>
<span class="font-bold text-sm tracking-wide">Adicionar Rede</span>
</button>
</div>
<!-- Bottom Navigation Bar -->
<nav class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 pb-8">
<div class="flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Início</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">share</span>
<span class="text-[10px] font-medium">Redes</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-medium">Relatórios</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</a>
</div>
</nav>
<!-- iOS Home Indicator -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
