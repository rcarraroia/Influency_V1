<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#660ce4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Main Settings Menu - Influency</title>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-list-item:active {
            background-color: rgba(102, 12, 228, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<!-- Mobile Container (Simulating 390x844 viewport) -->
<div class="relative mx-auto min-h-screen w-full max-w-[390px] bg-background-light dark:bg-background-dark flex flex-col shadow-2xl overflow-hidden">
<!-- Header Section -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
<div class="flex items-center justify-between px-4 pt-12 pb-4">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-primary">Configurações</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content (Settings List) -->
<main class="flex-1 overflow-y-auto px-4 py-6 space-y-6">
<!-- Account Section Group -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl overflow-hidden shadow-sm border border-primary/5">
<!-- Perfil -->
<a class="ios-list-item flex items-center gap-4 px-4 py-4 border-b border-slate-100 dark:border-slate-800 last:border-0 transition-colors" href="#">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">person</span>
</div>
<span class="flex-1 font-medium text-slate-700 dark:text-slate-200">Perfil</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</a>
<!-- Business DNA -->
<a class="ios-list-item flex items-center gap-4 px-4 py-4 border-b border-slate-100 dark:border-slate-800 last:border-0 transition-colors" href="#">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<span class="flex-1 font-medium text-slate-700 dark:text-slate-200">Business DNA</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</a>
<!-- Redes Sociais -->
<a class="ios-list-item flex items-center gap-4 px-4 py-4 border-b border-slate-100 dark:border-slate-800 last:border-0 transition-colors" href="#">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">share</span>
</div>
<span class="flex-1 font-medium text-slate-700 dark:text-slate-200">Redes Sociais</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</a>
</div>
<!-- Content Section Group -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl overflow-hidden shadow-sm border border-primary/5">
<!-- Assets -->
<a class="ios-list-item flex items-center gap-4 px-4 py-4 border-b border-slate-100 dark:border-slate-800 last:border-0 transition-colors" href="#">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">image</span>
</div>
<span class="flex-1 font-medium text-slate-700 dark:text-slate-200">Assets</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</a>
<!-- Notificações -->
<a class="ios-list-item flex items-center gap-4 px-4 py-4 border-b border-slate-100 dark:border-slate-800 last:border-0 transition-colors" href="#">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">notifications</span>
</div>
<span class="flex-1 font-medium text-slate-700 dark:text-slate-200">Notificações</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</a>
</div>
<!-- Info Section Group -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl overflow-hidden shadow-sm border border-primary/5">
<!-- Sobre -->
<a class="ios-list-item flex items-center gap-4 px-4 py-4 transition-colors" href="#">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">info</span>
</div>
<span class="flex-1 font-medium text-slate-700 dark:text-slate-200">Sobre</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</a>
</div>
<!-- Logout Button -->
<div class="pt-4">
<button class="w-full py-4 text-center font-semibold text-red-500 bg-white dark:bg-slate-900/50 rounded-xl border border-red-100 dark:border-red-900/30 active:bg-red-50 transition-colors">
                    Sair da Conta
                </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-primary/10 pb-8 pt-2">
<div class="flex justify-around items-center px-4">
<a class="flex flex-col items-center gap-1 text-slate-400 transition-colors hover:text-primary" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 transition-colors hover:text-primary" href="#">
<span class="material-symbols-outlined">campaign</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Campanhas</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 transition-colors hover:text-primary" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Chat</p>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Ajustes</p>
</a>
</div>
</nav>
<!-- Dynamic Notch Area (iOS) -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-900 rounded-b-2xl pointer-events-none"></div>
</div>
</body></html>
