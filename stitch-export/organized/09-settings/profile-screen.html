<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Perfil do Usuário - Influency</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#660ce4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#171022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-status-bar {
            height: 44px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex justify-center items-start min-h-screen antialiased">
<!-- Mobile Screen Wrapper (390x844px) -->
<div class="relative w-[390px] h-[844px] bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden flex flex-col border border-primary/10">
<!-- iOS Status Bar Placeholder -->
<div class="ios-status-bar flex justify-between items-center px-8 w-full">
<span class="text-xs font-semibold text-slate-900 dark:text-slate-100">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[16px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</div>
<!-- Header -->
<div class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Perfil</h2>
</div>
<!-- Profile Picture Section -->
<div class="flex flex-col items-center gap-4 py-6">
<div class="relative group">
<div class="size-24 bg-primary/10 rounded-full border-2 border-primary overflow-hidden flex items-center justify-center bg-cover bg-center" data-alt="Circular user profile avatar placeholder" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCTjmchzaRIxLdmOld2UcTL8f1Oxfm1MYiibOZ2luEicw8RH92gPKt1QjECutx3mW9wqNo2_UPpxzzFsf_lGq0LINIZgrzHj3freVUBHbfXebnAsv_fDTZ8R_DnRkIIGmOgsko1jFrVFC2CoTuUbOB24MPu4BAS1FGxscgnn6xq5JaIOePKjGbYFXAaa1u0fVogb5ksWrtkYe_hgJ9y_k5yzuYhLJPVEqv1K3zobPJ4rbQaSNf5iEf2cUYcJnUaJEFw5Uhcb34tbSah')">
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full shadow-lg border-2 border-background-light">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</button>
</div>
<button class="text-primary text-sm font-semibold">Alterar foto</button>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5 px-6 pt-4">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium px-1">Nome</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">person</span>
<input class="w-full h-14 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Digite seu nome completo" type="text" value="Alexandre Silva"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium px-1">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">mail</span>
<input class="w-full h-14 bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Digite seu email" type="email" value="alexandre@exemplo.com"/>
</div>
</div>
<!-- Change Password Link -->
<div class="flex justify-start pt-2">
<button class="flex items-center gap-2 text-primary text-sm font-bold tracking-tight hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[20px]">lock_reset</span>
<span>Alterar Senha</span>
</button>
</div>
</div>
<!-- Bottom Action Button -->
<div class="mt-auto px-6 pb-12">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-base rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Salvar Alterações
            </button>
</div>
<!-- iOS Home Indicator -->
<div class="flex justify-center w-full pb-2">
<div class="w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</body></html>
